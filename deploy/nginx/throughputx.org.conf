# nginx site config -> /etc/nginx/sites-available/ibkrapp (symlinked into sites-enabled).
# Reverse-proxies throughputx.org to the Next.js app on 127.0.0.1:3000.
# TLS lines marked "managed by Certbot" are added/maintained by `certbot --nginx`.

server {
    server_name throughputx.org www.throughputx.org;

    # Rate-limited login endpoint (brute-force protection): 10 req/min, burst 5.
    # Requires the limit_req_zone in deploy/nginx/ratelimit.conf (http context).
    location = /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/throughputx.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/throughputx.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.throughputx.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = throughputx.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name throughputx.org www.throughputx.org;
    return 404; # managed by Certbot
}
